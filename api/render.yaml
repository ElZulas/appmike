# Despliegue en https://render.com — Web Service (Node)
# Tras crear el servicio, copia la URL (ej. https://super-socio-api.onrender.com)
# en mobile/dart_defines/prod.json y recompila el APK.

services:
  - type: web
    name: super-socio-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGIN
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: WEB_PUBLIC_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
